services:
  mariadb:
    image: mariadb:11.4
    container_name: wcms-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${WCMS_MARIADB_ROOT_PASSWORD:-wcms_root_password}
      WCMS_MARIADB_APP_PASSWORD: ${WCMS_MARIADB_APP_PASSWORD:-wcms_app_password}
    ports:
      - "3306:3306"
    volumes:
      - wcms-mariadb-data:/var/lib/mysql
      - ./infra/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: wcms-redis
    ports:
      - "6379:6379"
    volumes:
      - wcms-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: wcms-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${WCMS_RABBITMQ_USER:-wcms}
      RABBITMQ_DEFAULT_PASS: ${WCMS_RABBITMQ_PASSWORD:-wcms_password}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - wcms-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./backend/wcms
      dockerfile: services/auth-service/Dockerfile
    container_name: wcms-auth-service
    environment:
      WCMS_AUTH_SERVER_PORT: 8080
      WCMS_AUTH_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/wcms_auth
      WCMS_AUTH_DATASOURCE_USERNAME: wcms_auth
      WCMS_AUTH_DATASOURCE_PASSWORD: ${WCMS_MARIADB_APP_PASSWORD:-wcms_app_password}
      WCMS_REDIS_HOST: redis
      WCMS_REDIS_PORT: 6379
      WCMS_RABBITMQ_HOST: rabbitmq
      WCMS_RABBITMQ_PORT: 5672
      WCMS_RABBITMQ_USER: ${WCMS_RABBITMQ_USER:-wcms}
      WCMS_RABBITMQ_PASSWORD: ${WCMS_RABBITMQ_PASSWORD:-wcms_password}
      WCMS_AUTH_TOKEN_SECRET: ${WCMS_AUTH_TOKEN_SECRET:-wcms-local-dev-secret-must-be-rotated}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: wcms-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy

volumes:
  wcms-mariadb-data:
  wcms-redis-data:
  wcms-rabbitmq-data:
