spring:
  application:
    name: auth-service
  datasource:
    url: ${WCMS_AUTH_DATASOURCE_URL:jdbc:mariadb://localhost:3306/wcms_auth}
    username: ${WCMS_AUTH_DATASOURCE_USERNAME:wcms_auth}
    password: ${WCMS_AUTH_DATASOURCE_PASSWORD:wcms_app_password}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${WCMS_REDIS_HOST:localhost}
      port: ${WCMS_REDIS_PORT:6379}
  rabbitmq:
    host: ${WCMS_RABBITMQ_HOST:localhost}
    port: ${WCMS_RABBITMQ_PORT:5672}
    username: ${WCMS_RABBITMQ_USER:wcms}
    password: ${WCMS_RABBITMQ_PASSWORD:wcms_password}

server:
  port: ${WCMS_AUTH_SERVER_PORT:18081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

wcms:
  auth:
    token:
      issuer: ${WCMS_AUTH_TOKEN_ISSUER:wcms-platform}
      secret: ${WCMS_AUTH_TOKEN_SECRET:wcms-local-dev-secret-must-be-rotated}
      access-token-ttl: ${WCMS_AUTH_ACCESS_TOKEN_TTL:15m}
      refresh-token-ttl: ${WCMS_AUTH_REFRESH_TOKEN_TTL:14d}
    login:
      max-failures: ${WCMS_AUTH_LOGIN_MAX_FAILURES:5}
      lock-duration: ${WCMS_AUTH_LOGIN_LOCK_DURATION:10m}
