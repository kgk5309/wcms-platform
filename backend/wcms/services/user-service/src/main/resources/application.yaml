spring:
  application:
    name: user-service
  datasource:
    url: ${WCMS_USER_DATASOURCE_URL:jdbc:mariadb://localhost:3306/wcms_user}
    username: ${WCMS_USER_DATASOURCE_USERNAME:wcms_user}
    password: ${WCMS_USER_DATASOURCE_PASSWORD:wcms_app_password}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${WCMS_REDIS_HOST:localhost}
      port: ${WCMS_REDIS_PORT:6379}
  rabbitmq:
    host: ${WCMS_RABBITMQ_HOST:localhost}
    port: ${WCMS_RABBITMQ_PORT:5672}
    username: ${WCMS_RABBITMQ_USER:wcms}
    password: ${WCMS_RABBITMQ_PASSWORD:wcms_password}

server:
  port: ${WCMS_USER_SERVER_PORT:18082}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api/users/docs
  swagger-ui:
    path: /api/users/docs/swagger-ui.html
    persist-authorization: true

wcms:
  user:
    token:
      issuer: ${WCMS_USER_TOKEN_ISSUER:wcms-platform}
      secret: ${WCMS_USER_TOKEN_SECRET:wcms-local-dev-secret-must-be-rotated}
